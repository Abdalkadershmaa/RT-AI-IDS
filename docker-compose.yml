services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://ids:ids@db:5432/ids
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    command: gunicorn -w 2 -b 0.0.0.0:5000 application:app

  flow-builder:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://ids:ids@db:5432/ids
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE: packet_ingest
      INFERENCE_QUEUE: inference
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - redis
    command: python -m services.flow_builder.worker

  inference:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+psycopg2://ids:ids@db:5432/ids
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE: inference
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - db
      - redis
    command: python -m services.inference.worker

  ingestion:
    profiles: ["capture"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      INGEST_QUEUE: packet_ingest
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - redis
    command: python -m services.ingestion.run_sniffer --interface ${CAPTURE_INTERFACE:-eth0}
    cap_add:
      - NET_RAW
      - NET_ADMIN

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ids
      POSTGRES_USER: ids
      POSTGRES_PASSWORD: ids
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
