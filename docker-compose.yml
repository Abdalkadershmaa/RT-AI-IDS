services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ids}
      POSTGRES_USER: ${POSTGRES_USER:-ids}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ids}
    # Bump max_connections so multiple replicas (api + workers + cli + readiness)
    # don't exhaust the default 100-slot ceiling under load. Pair with
    # DB_POOL_SIZE / DB_MAX_OVERFLOW on the application side.
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-200}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ids} -d ${POSTGRES_DB:-ids}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrations:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ids}:${POSTGRES_PASSWORD:-ids}@db:5432/${POSTGRES_DB:-ids}
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "alembic", "-c", "shared/db/migrations/alembic.ini", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ids}:${POSTGRES_PASSWORD:-ids}@db:5432/${POSTGRES_DB:-ids}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      BROKER_MAX_STREAM_LEN: ${BROKER_MAX_STREAM_LEN:-100000}
      BROKER_MAX_RETRIES: ${BROKER_MAX_RETRIES:-3}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-5 per minute}
      ATTACK_LOG_RETENTION_DAYS: ${ATTACK_LOG_RETENTION_DAYS:-90}
      MODEL_VERSION: ${MODEL_VERSION:-unknown}
      MODEL_DATASET: ${MODEL_DATASET:-CICIDS2017}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  flow-builder:
    build:
      context: .
      dockerfile: infra/docker/flow_builder.Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ids}:${POSTGRES_PASSWORD:-ids}@db:5432/${POSTGRES_DB:-ids}
      REDIS_URL: redis://redis:6379/0
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      BROKER_MAX_STREAM_LEN: ${BROKER_MAX_STREAM_LEN:-100000}
      BROKER_MAX_RETRIES: ${BROKER_MAX_RETRIES:-3}
    depends_on:
      redis:
        condition: service_healthy

  inference:
    build:
      context: .
      dockerfile: infra/docker/inference.Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-ids}:${POSTGRES_PASSWORD:-ids}@db:5432/${POSTGRES_DB:-ids}
      REDIS_URL: redis://redis:6379/0
      ALLOW_FALLBACK_CLASSIFIER: ${ALLOW_FALLBACK_CLASSIFIER:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      BROKER_MAX_STREAM_LEN: ${BROKER_MAX_STREAM_LEN:-100000}
      BROKER_MAX_RETRIES: ${BROKER_MAX_RETRIES:-3}
      MODEL_VERSION: ${MODEL_VERSION:-unknown}
      MODEL_DATASET: ${MODEL_DATASET:-CICIDS2017}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro

  ingestion:
    # Live capture profile. Activate with:
    #   docker compose --profile capture up -d ingestion
    # On Linux, sniffing a host interface (e.g. wlan0 used as Wi-Fi hotspot)
    # requires `network_mode: host` so the container shares the host's
    # network namespace. Docker Desktop on Windows/macOS runs containers in
    # a Linux VM and CANNOT see host Wi-Fi interfaces — for a live demo on
    # those platforms run ingestion natively (`make ingest`) instead. See
    # docs/live-demo-setup.md.
    profiles: ["capture"]
    build:
      context: .
      dockerfile: infra/docker/ingestion.Dockerfile
    network_mode: host
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # network_mode: host means we reach redis on localhost
      REDIS_URL: redis://127.0.0.1:6379/0
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-eth0}
      CAPTURE_BPF_FILTER: ${CAPTURE_BPF_FILTER-}
      CAPTURE_PROMISCUOUS: ${CAPTURE_PROMISCUOUS:-true}
      CAPTURE_PCAP_FILE: ${CAPTURE_PCAP_FILE-}
      CAPTURE_CMD: ${CAPTURE_CMD-}
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "services.ingestion.run_sniffer"]
    cap_add:
      - NET_RAW
      - NET_ADMIN

volumes:
  postgres_data:
